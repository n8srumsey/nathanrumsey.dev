name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e-tests:
    name: E2E & A11y Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npx playwright test

  semver-check:
    name: Semver Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Validate VERSION does not regress
        run: |
          LATEST=$(git tag -l "v*.*.*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No existing tags — first release, skipping check."
          else
            TAG_BASE=$(echo "$LATEST" | sed 's/^v//' | awk -F. '{print $1"."$2}')
            PR_BASE=$(cat VERSION)
            LOWER=$(printf "%s\n%s" "$PR_BASE" "$TAG_BASE" | sort -V | head -1)
            if [ "$PR_BASE" != "$TAG_BASE" ] && [ "$LOWER" = "$PR_BASE" ]; then
              echo "Error: VERSION ($PR_BASE) is lower than latest release ($TAG_BASE)"
              exit 1
            fi
            echo "OK: VERSION=$PR_BASE does not regress latest tag base=$TAG_BASE"
          fi

      - name: Validate package.json major.minor matches VERSION
        run: |
          PR_BASE=$(cat VERSION)
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_BASE=$(echo "$PKG_VERSION" | awk -F. '{print $1"."$2}')
          if [ "$PKG_BASE" != "$PR_BASE" ]; then
            echo "Error: package.json version ($PKG_VERSION) major.minor ($PKG_BASE) does not match VERSION ($PR_BASE)"
            exit 1
          fi
          echo "OK: package.json major.minor=$PKG_BASE matches VERSION=$PR_BASE"
