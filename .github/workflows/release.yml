name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Compute next version
        id: version
        run: |
          BASE=$(cat VERSION)
          LATEST=$(git tag -l "v${BASE}.*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST" | awk -F. '{print $NF}')
            PATCH=$((PATCH + 1))
          fi
          echo "tag=v${BASE}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "semver=${BASE}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Bump package.json version
        run: npm version "${{ steps.version.outputs.semver }}" --no-git-tag-version

      - name: Commit and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.version.outputs.tag }}"
