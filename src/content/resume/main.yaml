experience:
  - company: SAIF Corporation
    role: Software Development Engineer I
    start: "2025-06"
    end: "2025-12"
    location: Salem, OR
    description: >
      Delivered backend improvements and tooling for mission-critical financial and
      insurance systems at Oregon's largest workers' compensation insurer.
    annotations:
      - term: "workers' compensation"
        detail: "State-funded insurance covering employee medical costs and lost wages from workplace injuries. SAIF is Oregon's only not-for-profit, state-chartered workers' compensation insurer, holding ~35% of the Oregon market."
        style: keyword
      - term: "short-rate cancellations"
        detail: "A billing adjustment applied when a policyholder cancels mid-term, where the refund is calculated at a penalty rate rather than pro-rata. Errors in this logic produce incorrect refund amounts that directly reduce written premium."
        style: keyword
      - term: "Gosu"
        detail: "A JVM-based, strongly-typed language developed by Guidewire Software, used exclusively within Guidewire's insurance platform suite (PolicyCenter, BillingCenter, ClaimCenter)."
        style: tech
      - term: "BDD scenarios"
        detail: "Behavior-Driven Development — scenarios written in plain English (Gherkin syntax) before implementation. Enables non-technical stakeholders to review and sign off on test coverage before a release ships."
        style: tech
      - term: "$100k+"
        detail: "Estimated from historical erroneous refund rates applied to the annual volume of mid-term cancellation transactions processed through the billing engine."
        style: achievement
    highlights:
      - Engineered corrections to the short-rate cancellations in billing engine, implementing transactional logic using Gosu to prevent erroneous refunds and safeguard $100k+ in annual revenue.
      - Refactored a legacy VB.NET actuarial regulatory reporting tool into C#, introducing parallel bulk processing and unit test coverage to reduce turnaround time from days to hours.
      - Unblocked new customer acquisition by resolving an address validation issue in the issuance workflow that prevented foreign customers from purchasing policies, enabling seamless onboarding and avoiding manual workarounds.
      - Developed BDD scenarios with Cucumber/Gherkin to validate core business workflows, eliminating one week of manual validation and ensuring on-time regulatory compliance for high-stakes releases.

  - company: MKS Instruments, Inc.
    role: Reliability Engineer Intern
    start: "2024-04"
    end: "2024-09"
    location: Beaverton, OR
    description: >
      Built test infrastructure, data pipelines, and tooling to improve reliability
      and quality visibility across precision motion control and laser systems.
    annotations:
      - term: "precision motion control"
        detail: "MKS Instruments' motion control product line manufactures high-precision servo and stepper systems for semiconductor fabrication equipment, where positioning accuracy is measured in microns."
        style: keyword
      - term: "RCA"
        detail: "Root Cause Analysis — a structured investigation process to identify the underlying failure mode behind a field defect, rather than treating the surface symptom. Used to correlate field failure patterns back to manufacturing or design causes."
        style: keyword
      - term: "90%"
        detail: "Calculated by comparing raw frame sizes from the AI vision system against compressed archive output. Data was previously stored uncompressed on local manufacturing floor drives before the archival tool was introduced."
        style: achievement
      - term: "$3000+"
        detail: "Projected from the per-GB cost of local SSD storage replaced by compressed cold storage, multiplied by annual data throughput from the manufacturing floor defect detection system."
        style: achievement
    highlights:
      - Extended C# .NET test infrastructure for a precision motion control system, leveraging dependency injection to validate against both simulated and physical hardware and improving test result reporting.
      - Designed a field failure tracking system and data consolidation pipeline for laser components, processing 10k+ records spanning decades to deliver reliability insights and RCA to leadership, informing warranty projections.
      - Engineered Python CLI tool to compress and archive AI computer vision defect detection data from the manufacturing floor, reducing storage needs by 90% and saving $3000+ annually in hardware costs.
      - Automated quality metrics reporting across cross-functional teams using Azure dataflows and Power BI backed by Azure Data Lake, eliminating manual entry errors and saving leadership 10+ hours monthly.

